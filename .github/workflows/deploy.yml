# Pipeline de deploy automático — Nordic Worklog
# Dispara em cada push na branch main
# Deploy: Firebase Hosting (frontend) + Cloud Run (backend)
name: Deploy Automático

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build e Deploy em Produção
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Checkout do código
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # Passo 2: Configurar Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Passo 3: Instalar dependências e build do frontend
      - name: Instalar dependências e build
        run: |
          npm ci
          npm run build
        env:
          VITE_OPENWEATHER_API_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY }}
          VITE_WEATHER_CITY: ${{ secrets.VITE_WEATHER_CITY }}

      # Passo 4: Deploy do backend no Cloud Run
      - name: Deploy backend no Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: nordic-api
          region: us-central1
          source: backend/
          flags: '--allow-unauthenticated --set-env-vars=FIREBASE_SA_KEY=${{ secrets.FIREBASE_SA_KEY }}'

      # Passo 5: Deploy do frontend no Firebase Hosting
      - name: Deploy frontend no Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: worklog-f1824
