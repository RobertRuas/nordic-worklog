# Pipeline de deploy automático — Nordic Worklog
# Dispara em cada push na branch main
# Deploy: Firebase Hosting (frontend) + Docker no servidor (backend)
name: Deploy Automático

on:
  push:
    branches: [main]

jobs:
  # ═══ Job 1: Deploy do frontend no Firebase Hosting ═══
  deploy-frontend:
    name: Deploy Frontend (Firebase Hosting)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências e build
        run: |
          npm ci
          npm run build
        env:
          VITE_OPENWEATHER_API_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY }}
          VITE_WEATHER_CITY: ${{ secrets.VITE_WEATHER_CITY }}

      - name: Deploy no Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: worklog-f1824

  # ═══ Job 2: Deploy do backend no servidor Docker ═══
  deploy-backend:
    name: Deploy Backend (Docker Server)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sincronizar código com o servidor
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'dist' \
            --exclude 'firebase.json' \
            --exclude '.firebaserc' \
            . ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/ubuntu/apps/nordic-worklog/

      - name: Reconstruir container Docker no servidor
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/apps/nordic-worklog
            sudo docker compose build --no-cache
            sudo docker compose up -d
            sudo docker image prune -f
