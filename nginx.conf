# Configuração Nginx para Nordic Worklog
# - Serve arquivos estáticos no subpath /worklog/
# - Proxy /api/ para o servidor Express (porta 3001)
server {
    listen 3000;
    server_name localhost;

    # ═══ API — Proxy para Express ═══
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ═══ Frontend — Arquivos estáticos no subpath /worklog/ ═══
    location /worklog/ {
        alias /usr/share/nginx/html/worklog/;
        index index.html;

        # Fallback para SPA — redireciona rotas para index.html
        try_files $uri $uri/ /worklog/index.html;
    }

    # Redireciona raiz para /worklog/
    location = / {
        return 301 /worklog/;
    }
}
# Configuração Nginx para Nordic Worklog (servir no subpath /worklog/)
server {
    listen 3000;
    server_name localhost;

    # Serve os arquivos estáticos no subpath /worklog/
    location /worklog/ {
        alias /usr/share/nginx/html/worklog/;
        index index.html;

        # Fallback para SPA — redireciona rotas para index.html
        try_files $uri $uri/ /worklog/index.html;
    }

    # Redireciona raiz para /worklog/
    location = / {
        return 301 /worklog/;
    }
}
